<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Unlock Page</title>
</head>

<body style="text-align:center;margin-top:100px;font-family:Arial;">

<h2>Complete Both Steps to Unlock</h2>

<br>

<a href="task1.html">
  <button style="padding:15px 30px;font-size:18px;">Step 1</button>
</a>

<br><br>

<a href="task2.html">
  <button style="padding:15px 30px;font-size:18px;">Step 2</button>
</a>

<br><br>

<button id="unlockBtn" disabled style="padding:15px 30px;font-size:18px;">
Unlock Link
</button>

<br><br>
<button id="resetBtn" style="padding:10px 18px;">Reset</button>

<script>
const FINAL_LINK = "https://t.me/SL_CYBER_VPN";

function refreshUnlock(){
  const t1 = localStorage.getItem("task1_done") === "1";
  const t2 = localStorage.getItem("task2_done") === "1";
  document.getElementById("unlockBtn").disabled = !(t1 && t2);
}

// page load + every time you come back (simple polling)
refreshUnlock();
setInterval(refreshUnlock, 700);

document.getElementById("unlockBtn").onclick = () => {
  window.open(FINAL_LINK, "_blank");
};

document.getElementById("resetBtn").onclick = () => {
  localStorage.removeItem("task1_done");
  localStorage.removeItem("task2_done");
  refreshUnlock();
  alert("Reset done.");
};
</script>

</body>
</html>
