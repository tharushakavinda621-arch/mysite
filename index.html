<script>
  const AD_LINK_1 = "https://omg10.com/4/10683927";
  const AD_LINK_2 = "https://omg10.com/4/10683927";
  const FINAL_LINK = "https://sub2unlock.me/Lbv1kr3";

  const MIN_SECONDS_ON_AD = 6;
  const key = "u_state_v2";

  const now = () => Date.now();

  function load() {
    try { return JSON.parse(sessionStorage.getItem(key) || "{}"); }
    catch { return {}; }
  }
  function save(s) { sessionStorage.setItem(key, JSON.stringify(s)); }

  function doneCount(s){ return (s.done1?1:0)+(s.done2?1:0); }

  function render(){
    const s = load();
    document.getElementById("prog").textContent = Steps Completed ${doneCount(s)}/2;
    document.getElementById("unlock").disabled = !(s.done1 && s.done2);
    document.getElementById("s1").classList.toggle("done", !!s.done1);
    document.getElementById("s2").classList.toggle("done", !!s.done2);
  }

  // ✅ Back කරලා ආවම auto complete
  function autoComplete(){
    const s = load();
    // step1 started but not done
    if(s.start1 && !s.done1){
      const elapsed = (now() - s.start1)/1000;
      if(elapsed >= MIN_SECONDS_ON_AD) s.done1 = true;
    }
    if(s.start2 && !s.done2){
      const elapsed = (now() - s.start2)/1000;
      if(elapsed >= MIN_SECONDS_ON_AD) s.done2 = true;
    }
    save(s);
    render();
  }

  function goStep(step){
    const s = load();
    s["start"+step] = now();
    save(s);

    const url = step === 1 ? AD_LINK_1 : AD_LINK_2;

    // ✅ Same tab navigate (popup block නැහැ)
    window.location.href = url;
  }

  document.getElementById("btn1").onclick = () => goStep(1);
  document.getElementById("btn2").onclick = () => goStep(2);

  document.getElementById("unlock").onclick = () => {
    window.location.href = FINAL_LINK;
  };

  document.getElementById("reset").onclick = () => {
    sessionStorage.removeItem(key);
    render();
    alert("Reset done");
  };

  // page load එකේ autoComplete check
  autoComplete();

  // user back වුනාම page reload වෙනවා, ඒකෙන් autoComplete run වෙනවා
</script>
